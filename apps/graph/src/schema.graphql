scalar JSON
scalar DateTime

enum BriefingStatus {
  pending
  researching
  drafting
  ready
  failed
}

type UpcomingMeeting {
  id: ID!
  title: String!
  startsAt: DateTime!
  attendees: JSON
  description: String
}

type NotionPage {
  id: ID!
  title: String!
  excerpt: String
}

type CitedSource {
  id: ID!
  title: String!
  url: String
  kind: String!
}

type Briefing {
  id: ID!
  userId: ID!
  meetingId: ID
  contactName: String
  contactEmail: String
  contactRole: String
  companyName: String
  companyDomain: String
  companySummary: String
  status: BriefingStatus!
  summary60s: String
  sections: JSON
  sourcesCount: Int!
  errorMessage: String
  researchStartedAt: DateTime
  researchFinishedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

type BriefingListItem {
  id: ID!
  title: String!
  companyName: String
  status: BriefingStatus!
  createdAt: DateTime!
}

type ProgressEvent {
  step: String!
  pct: Int!
  detail: String
  at: Float!
}

type ProgressSnapshot {
  jobId: ID!
  current: ProgressEvent!
  history: [ProgressEvent!]!
}

type CreateBriefingResult {
  briefingId: ID!
  jobId: ID!
  deduped: Boolean!
}

type AnswerResult {
  text: String!
}

type DraftFollowUpEmailResult {
  emailText: String!
}

type SaveCallTranscriptResult {
  transcriptId: ID!
}

enum AnswerMode {
  question
  section
}

type Query {
  listUpcomingMeetings(userId: ID!, limit: Int): [UpcomingMeeting!]!
  searchNotionContext(userId: ID!, query: String!): [NotionPage!]!
  getBriefingProgress(jobId: ID!): ProgressSnapshot!
  getBriefing(id: ID!): Briefing!
  listBriefings(userId: ID!, limit: Int): [BriefingListItem!]!
}

type Mutation {
  createBriefingFromMeeting(
    userId: ID!
    meetingId: ID!
    notionPageIds: [ID!]!
  ): CreateBriefingResult!

  answerFromBriefing(
    briefingId: ID!
    mode: AnswerMode!
    input: String!
    callId: ID!
  ): AnswerResult!

  draftFollowUpEmail(briefingId: ID!, tone: String): DraftFollowUpEmailResult!

  saveCallTranscript(
    briefingId: ID!
    vapiCallId: String!
    transcript: JSON!
    recordingUrl: String
    startedAt: DateTime!
    endedAt: DateTime!
  ): SaveCallTranscriptResult!
}
