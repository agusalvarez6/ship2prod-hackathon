mutation saveCallTranscript(
  $briefingId: ID!
  $vapiCallId: String!
  $transcript: JSON!
  $recordingUrl: String
  $startedAt: DateTime!
  $endedAt: DateTime!
) {
  saveCallTranscript(
    briefingId: $briefingId
    vapiCallId: $vapiCallId
    transcript: $transcript
    recordingUrl: $recordingUrl
    startedAt: $startedAt
    endedAt: $endedAt
  ) {
    transcriptId
  }
}
