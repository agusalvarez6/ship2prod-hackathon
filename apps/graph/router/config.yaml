version: "1"

listen_addr: "0.0.0.0:3002"
graph:
  execution_config:
    file:
      path: /etc/router/config.json

graphql_path: /graphql
playground_enabled: true
introspection_enabled: true

cors:
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - OPTIONS
  allow_headers:
    - content-type
    - authorization

log_level: info
